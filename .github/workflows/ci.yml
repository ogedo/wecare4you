name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

env:
  NODE_VERSION: "22"
  PNPM_VERSION: "9.14.4"

jobs:
  # ─── Lint + Type check ───────────────────────────────────────────────────────
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @wecare4you/api db:generate
        env:
          DATABASE_URL: postgresql://x:x@localhost:5432/x

      - name: Lint (all workspaces)
        run: pnpm turbo run lint

      - name: Type-check API
        run: pnpm --filter @wecare4you/api exec tsc --noEmit
        env:
          DATABASE_URL: postgresql://x:x@localhost:5432/x
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: ci-secret-placeholder-minimum-32-chars
          JWT_REFRESH_SECRET: ci-refresh-secret-minimum-32-chars
          TERMII_API_KEY: ci
          PAYSTACK_SECRET_KEY: ci
          PAYSTACK_WEBHOOK_SECRET: ci
          DAILY_API_KEY: ci
          DAILY_DOMAIN: ci.daily.co

      - name: Type-check Web
        run: pnpm --filter @wecare4you/web exec tsc --noEmit

  # ─── API integration tests ───────────────────────────────────────────────────
  test-api:
    name: API — DB + Schema
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: wecare4you_test
          POSTGRES_USER: wecare4you
          POSTGRES_PASSWORD: wecare4you
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    env:
      DATABASE_URL: postgresql://wecare4you:wecare4you@localhost:5432/wecare4you_test
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: test-secret-minimum-32-characters-long
      JWT_REFRESH_SECRET: test-refresh-minimum-32-characters-long
      TERMII_API_KEY: test
      PAYSTACK_SECRET_KEY: test
      PAYSTACK_WEBHOOK_SECRET: test
      DAILY_API_KEY: test
      DAILY_DOMAIN: test.daily.co
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @wecare4you/api db:generate
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}

      - name: Push schema to test DB
        run: pnpm --filter @wecare4you/api db:push

      - name: Run seed
        run: pnpm --filter @wecare4you/api db:seed
        env:
          ADMIN_EMAIL: admin@test.com
          ADMIN_PHONE: "+2348000000001"
          ADMIN_PASSWORD: TestAdmin@123

  # ─── Build ───────────────────────────────────────────────────────────────────
  build-api:
    name: Build API
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @wecare4you/api db:generate
        env:
          DATABASE_URL: postgresql://x:x@localhost:5432/x

      - name: Build API
        run: pnpm --filter @wecare4you/api build
        env:
          DATABASE_URL: postgresql://x:x@localhost:5432/x
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: ci-secret-placeholder-minimum-32-chars
          JWT_REFRESH_SECRET: ci-refresh-secret-minimum-32-chars
          TERMII_API_KEY: ci
          PAYSTACK_SECRET_KEY: ci
          PAYSTACK_WEBHOOK_SECRET: ci
          DAILY_API_KEY: ci
          DAILY_DOMAIN: ci.daily.co

  build-web:
    name: Build Web
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Web
        run: pnpm --filter @wecare4you/web build
        env:
          NEXT_PUBLIC_API_URL: https://api.wecare4you.ng
