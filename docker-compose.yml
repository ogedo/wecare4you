version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: wecare4you_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: wecare4you_db
      POSTGRES_USER: wecare4you
      POSTGRES_PASSWORD: wecare4you
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wecare4you -d wecare4you_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: wecare4you_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: wecare4you_api
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file:
      - .env
    environment:
      DATABASE_URL: "postgresql://wecare4you:wecare4you@postgres:5432/wecare4you_db"
      REDIS_URL: "redis://redis:6379"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: wecare4you_web
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: "http://api:3001"
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
